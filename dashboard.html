<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otis's Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://flagcdn.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --ink:             #2c1a0e;
  --ink-medium:      #4a2e0e;
  --ink-muted:       #8a6840;
  --ink-faint:       #b0905a;
  --page-bg:         #e8d5b0;
  --paper:           #fdf6e3;
  --paper-deep:      #f5e6c8;
  --border:          #c8a87a;
  --border-light:    #e0d0b8;
  --accent-red:      #d94f3d;
  --accent-red-deep: #9b2e1f;
  --accent-blue:     #3a6ea5;
  --accent-green:    #4a8c5c;
  --accent-yellow:   #e8b84b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--page-bg);
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(100,80,50,0.07) 27px, rgba(100,80,50,0.07) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(100,80,50,0.04) 27px, rgba(100,80,50,0.04) 28px);
  font-family: 'Caveat', cursive;
  color: var(--ink);
  min-height: 100vh;
  padding: 24px 16px 64px;
}

.wrap {
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── PAPER CARD ── */
.card {
  background: var(--paper);
  border-radius: 4px;
  box-shadow: 3px 3px 0 rgba(44,26,14,0.12), 6px 6px 0 rgba(44,26,14,0.06);
  padding: 36px 32px;
  position: relative;
}
.tape::before {
  content: '';
  position: absolute;
  top: -13px; left: 50%;
  transform: translateX(-50%) rotate(-1.5deg);
  width: 68px; height: 24px;
  background: rgba(255,220,100,0.55);
  border-radius: 2px;
  pointer-events: none;
}

/* ── HEADER ── */
.site-header {
  text-align: center;
  padding: 40px 32px 32px;
}
.header-badge {
  display: inline-block;
  background: var(--accent-red);
  color: var(--paper);
  font-family: 'Permanent Marker', cursive;
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 100px;
  transform: rotate(-2deg);
  margin-bottom: 16px;
}
.header-title {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(2.4rem, 7vw, 4rem);
  line-height: 1.1;
  margin-bottom: 8px;
}
.header-sub {
  font-size: 1.3rem;
  color: var(--ink-muted);
}

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.stat-card {
  text-align: center;
  padding: 28px 16px 24px;
}
.stat-card:nth-child(1) { transform: rotate(-1deg); }
.stat-card:nth-child(2) { transform: rotate(0.6deg); }
.stat-card:nth-child(3) { transform: rotate(-0.8deg); }
.stat-icon { font-size: 2.2rem; display: block; margin-bottom: 6px; }
.stat-num {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(2.4rem, 6vw, 3.6rem);
  display: block;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-card:nth-child(1) .stat-num { color: var(--accent-red); }
.stat-card:nth-child(2) .stat-num { color: var(--accent-green); }
.stat-card:nth-child(3) .stat-num { color: var(--accent-blue); }
.stat-label {
  font-family: 'Caveat', cursive;
  font-size: 1.05rem;
  color: var(--ink-muted);
  font-variant: small-caps;
  letter-spacing: 0.05em;
}

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(1.5rem, 4vw, 2rem);
  color: var(--ink);
  margin-bottom: 28px;
  text-align: center;
}
.section-title::after {
  content: '';
  display: block;
  width: 64px; height: 4px;
  background: var(--accent-yellow);
  border-radius: 2px;
  margin: 8px auto 0;
}

/* ── ORDER CARD ── */
.order-card {
  padding: 28px 28px 32px;
  border-top: 1px solid var(--border-light);
}
.order-card:first-child { border-top: none; padding-top: 0; }

.order-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.order-flags {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.order-flag {
  height: 30px;
  width: 45px;
  object-fit: contain;
  border-radius: 2px;
  border: 1px solid var(--border-light);
  box-shadow: 2px 2px 0 rgba(44,26,14,0.1);
  display: block;
}
.order-flag-placeholder {
  height: 30px;
  width: 45px;
  border-radius: 2px;
  border: 2px dashed var(--border);
  background: var(--paper-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--ink-muted);
  font-family: 'Caveat', cursive;
  text-align: center;
  line-height: 1.2;
  padding: 4px;
}
.order-name {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(1.4rem, 3.5vw, 2rem);
  line-height: 1.1;
  color: var(--ink);
}
.order-city {
  font-family: 'Caveat', cursive;
  font-size: 1.15rem;
  color: var(--ink-muted);
  margin-top: 4px;
}

/* ── PROGRESS TRACK ── */
.progress-wrap {
  position: relative;
  padding: 0 4px;
}
.progress-track-line {
  position: absolute;
  top: 22px;
  left: calc(12.5% + 4px);
  right: calc(12.5% + 4px);
  height: 3px;
  background: var(--border);
  border-radius: 2px;
}
.progress-fill {
  height: 100%;
  background: var(--accent-green);
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0,0,0.2,1);
}
.progress-steps {
  display: flex;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}
.p-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.p-dot {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 3px solid var(--border);
  background: var(--paper);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  transition: all 0.3s;
}
.p-step.done .p-dot {
  background: var(--accent-green);
  border-color: var(--accent-green);
  font-size: 1rem;
}
.p-step.now .p-dot {
  background: var(--accent-red);
  border-color: var(--accent-red);
  box-shadow: 0 0 0 5px rgba(217,79,61,0.18);
  width: 52px;
  height: 52px;
  font-size: 1.4rem;
  margin-top: -4px;
}
.p-label {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(0.7rem, 2vw, 0.88rem);
  text-align: center;
  color: var(--ink-faint);
  line-height: 1.2;
}
.p-step.done .p-label { color: var(--ink-medium); }
.p-step.now  .p-label { color: var(--accent-red); }

.order-notes {
  margin-top: 20px;
  font-size: 1.1rem;
  font-style: italic;
  color: var(--ink-muted);
  background: var(--paper-deep);
  border-radius: 2px;
  padding: 10px 14px;
}

/* ── MAP ── */
.map-card { padding: 36px 28px 32px; }
#world-map {
  height: 360px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: var(--paper-deep);
  overflow: hidden;
}
.leaflet-container { font-family: 'Caveat', cursive; }
.leaflet-popup-content-wrapper {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: 3px 3px 0 rgba(44,26,14,0.12);
  font-family: 'Caveat', cursive;
  font-size: 1rem;
}
.leaflet-popup-tip { background: var(--paper); }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 8px;
  font-size: 1.15rem;
  color: var(--ink-muted);
}
footer a { color: var(--accent-blue); text-decoration: none; }
footer a:hover { text-decoration: underline; }

@media (max-width: 520px) {
  .card { padding: 28px 20px; }
  .stats-row { grid-template-columns: 1fr; }
  .stat-card:nth-child(1),
  .stat-card:nth-child(2),
  .stat-card:nth-child(3) { transform: none; }
  #world-map { height: 260px; }
  .order-header { gap: 14px; }
}
</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header class="card tape site-header">
    <div class="header-badge">🏆 Private dashboard</div>
    <h1 class="header-title">Otis's World 🌍</h1>
    <p class="header-sub">Every flag tells a story</p>
  </header>

  <!-- STATS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- ORDERS -->
  <div class="card tape">
    <h2 class="section-title">Orders 📋</h2>
    <div id="ordersList"></div>
  </div>

  <!-- MAP -->
  <div class="card tape map-card">
    <h2 class="section-title">Where they're going 🗺️</h2>
    <div id="world-map"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="flag-shop.html">← Back to the shop</a>
    &nbsp;·&nbsp; Made with crayons 🖍️ — Otis
  </footer>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ── ORDER DATA (hardcoded — add new orders here) ──────────────────────────
const ORDERS = [
  {
    id: '001',
    name: 'Aunty Nimatha',
    city: 'Stockholm',
    country: 'Sweden',
    flags: ['gh', 'ps', 'cd'],
    status: 'delivered',
    notes: ''
  },
  {
    id: '002',
    name: 'Mormor Maria',
    city: 'Stockholm',
    country: 'Sweden',
    flags: ['se', 'gh', 'za'],
    status: 'delivered',
    notes: ''
  },
  {
    id: '003',
    name: 'Aunty G',
    city: 'New York',
    country: 'USA',
    flags: ['pride'],
    status: 'drawn',
    notes: ''
  },
  {
    id: '004',
    name: 'Uncle Wadood',
    city: '',
    country: 'Unknown',
    flags: ['tbc'],
    status: 'sent',
    notes: 'Sent — not arrived yet'
  },
  {
    id: '005',
    name: 'Uncle Arez',
    city: 'Stockholm',
    country: 'Sweden',
    flags: ['kurdistan'],
    status: 'drawn',
    notes: ''
  },
  {
    id: '006',
    name: 'Uncle Ayman',
    city: '',
    country: 'Palestine',
    flags: ['ps'],
    status: 'drawn',
    notes: ''
  }
];

// ── SPECIAL FLAGS (non-ISO, no flagcdn URL) ────────────────────────────────
const SPECIAL_FLAGS = {
  'kurdistan': 'https://commons.wikimedia.org/wiki/Special:FilePath/Flag_of_Kurdistan.svg',
  'pride':     'https://commons.wikimedia.org/wiki/Special:FilePath/Progress_Pride_Flag.svg',
};

// ── STAGES ────────────────────────────────────────────────────────────────
const STAGES = [
  { key: 'drawn',     emoji: '✏️',  label: 'Drawing'    },
  { key: 'packed',    emoji: '📦',  label: 'Packed'     },
  { key: 'sent',      emoji: '✈️',  label: 'On its way' },
  { key: 'delivered', emoji: '🎉',  label: 'Delivered!' },
];

// ── CITY COORDS (add cities here as needed) ───────────────────────────────
const CITY_COORDS = {
  'addis ababa':  [8.981,  38.758],
  'stockholm':    [59.329, 18.068],
  'göteborg':     [57.708, 11.974],
  'goteborg':     [57.708, 11.974],
  'malmö':        [55.605, 13.003],
  'malmo':        [55.605, 13.003],
  'uppsala':      [59.858, 17.638],
  'new york':     [40.712, -74.005],
  'london':       [51.507, -0.127],
  'oslo':         [59.913, 10.752],
  'copenhagen':   [55.676, 12.568],
  'nairobi':      [-1.292, 36.821],
  'toronto':      [43.653, -79.383],
  'sydney':       [-33.868, 151.209],
  'berlin':       [52.520, 13.404],
  'paris':        [48.856, 2.352],
};

const ADDIS = [8.9806, 38.7578];

// ── STATS ─────────────────────────────────────────────────────────────────
function renderStats() {
  const totalFlags     = ORDERS.reduce((n, o) => n + o.flags.length, 0);
  const totalCountries = new Set(ORDERS.map(o => o.country)).size;
  const delivered      = ORDERS.filter(o => o.status === 'delivered').length;

  const row = document.getElementById('statsRow');
  row.innerHTML = `
    <div class="card stat-card">
      <span class="stat-icon">🎨</span>
      <span class="stat-num">${totalFlags}</span>
      <span class="stat-label">Flags ordered</span>
    </div>
    <div class="card stat-card">
      <span class="stat-icon">🌍</span>
      <span class="stat-num">${totalCountries}</span>
      <span class="stat-label">Countries</span>
    </div>
    <div class="card stat-card">
      <span class="stat-icon">🎉</span>
      <span class="stat-num">${delivered}</span>
      <span class="stat-label">Delivered</span>
    </div>
  `;
}

// ── ORDERS ────────────────────────────────────────────────────────────────
function renderOrders() {
  const container = document.getElementById('ordersList');

  if (ORDERS.length === 0) {
    container.innerHTML = `<p style="text-align:center;color:var(--ink-muted);font-size:1.3rem;padding:24px 0;">No orders yet — the shop is open! 🚩</p>`;
    return;
  }

  ORDERS.forEach(order => {
    const stageIdx  = STAGES.findIndex(s => s.key === order.status);
    const fillPct   = stageIdx <= 0 ? 0 : (stageIdx / (STAGES.length - 1)) * 100;

    const flagsHTML = order.flags.map(f => {
      if (f === 'tbc' || !f) {
        return `<div class="order-flag-placeholder">TBC</div>`;
      }
      if (SPECIAL_FLAGS[f]) {
        return `<img class="order-flag" src="${SPECIAL_FLAGS[f]}" alt="${f} flag" loading="lazy">`;
      }
      return `<img class="order-flag" src="https://flagcdn.com/w160/${f}.png" alt="${f} flag" loading="lazy">`;
    }).join('');

    const stepsHTML = STAGES.map((s, i) => {
      const cls   = i < stageIdx ? 'done' : i === stageIdx ? 'now' : '';
      const inner = i < stageIdx ? '✓' : s.emoji;
      return `
        <div class="p-step ${cls}" aria-current="${i === stageIdx ? 'step' : 'false'}">
          <div class="p-dot">${inner}</div>
          <span class="p-label">${s.label}</span>
        </div>
      `;
    }).join('');

    const div = document.createElement('div');
    div.className = 'order-card';
    div.innerHTML = `
      <div class="order-header">
        <div class="order-flags">${flagsHTML}</div>
        <div>
          <div class="order-name">${order.name}</div>
          <div class="order-city">${[order.city, order.country].filter(Boolean).join(', ')}</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track-line">
          <div class="progress-fill" style="width:${fillPct}%"></div>
        </div>
        <div class="progress-steps">${stepsHTML}</div>
      </div>
      ${order.notes ? `<div class="order-notes">📝 ${order.notes}</div>` : ''}
    `;
    container.appendChild(div);
  });
}

// ── MAP ───────────────────────────────────────────────────────────────────
function gcArc(lat1, lon1, lat2, lon2, n = 60) {
  const r = Math.PI / 180, d = 180 / Math.PI;
  const p1 = lat1*r, l1 = lon1*r, p2 = lat2*r, l2 = lon2*r;
  const D = 2 * Math.asin(Math.sqrt(
    Math.sin((p2-p1)/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin((l2-l1)/2)**2
  ));
  if (!D) return [[lat1, lon1]];
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const f = i/n, A = Math.sin((1-f)*D)/Math.sin(D), B = Math.sin(f*D)/Math.sin(D);
    const x = A*Math.cos(p1)*Math.cos(l1) + B*Math.cos(p2)*Math.cos(l2);
    const y = A*Math.cos(p1)*Math.sin(l1) + B*Math.cos(p2)*Math.sin(l2);
    const z = A*Math.sin(p1) + B*Math.sin(p2);
    pts.push([Math.atan2(z, Math.sqrt(x*x+y*y))*d, Math.atan2(y,x)*d]);
  }
  return pts;
}

function initMap() {
  const map = L.map('world-map', { zoomControl: true, minZoom: 2 });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 18,
  }).addTo(map);

  // Home marker — Addis Ababa
  const homeIcon = L.divIcon({
    className: '',
    html: `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
      <div style="font-size:1.6rem;line-height:1;filter:drop-shadow(1px 1px 0 rgba(44,26,14,.3));">🏠</div>
      <div style="font-family:'Permanent Marker',cursive;font-size:11px;color:#2c1a0e;background:#fffdf6;padding:2px 7px;border-radius:3px;box-shadow:1px 1px 0 rgba(44,26,14,.18);white-space:nowrap;">Otis!</div>
    </div>`,
    iconSize: [56, 46],
    iconAnchor: [28, 36],
  });
  L.marker(ADDIS, { icon: homeIcon }).addTo(map)
    .bindPopup('<b>🏠 Addis Ababa</b><br>Otis draws here!');

  const bounds = [ADDIS];

  ORDERS.forEach(order => {
    if (!order.city) return;
    const coords = CITY_COORDS[order.city.toLowerCase()];
    if (!coords) return;
    bounds.push(coords);

    // Arc line
    const arc = gcArc(ADDIS[0], ADDIS[1], coords[0], coords[1]);
    L.polyline(arc, {
      color: '#d94f3d',
      weight: 2.5,
      opacity: 0.75,
      dashArray: '8, 6',
    }).addTo(map);

    // Destination marker
    const flagCode = order.flags.find(f => f && f !== 'tbc');
    const markerHtml = flagCode
      ? (SPECIAL_FLAGS[flagCode]
        ? `<img src="${SPECIAL_FLAGS[flagCode]}" style="width:34px;height:22px;object-fit:contain;border-radius:2px;border:2px solid #fffdf6;box-shadow:2px 2px 0 rgba(44,26,14,.3);">`
        : `<img src="https://flagcdn.com/w40/${flagCode}.png" style="width:34px;border-radius:2px;border:2px solid #fffdf6;box-shadow:2px 2px 0 rgba(44,26,14,.3);">`)
      : `<div style="font-size:1.4rem;">📍</div>`;

    const destIcon = L.divIcon({
      className: '',
      html: `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        ${markerHtml}
        <div style="font-family:'Permanent Marker',cursive;font-size:10px;color:#2c1a0e;background:#fffdf6;padding:2px 6px;border-radius:3px;box-shadow:1px 1px 0 rgba(44,26,14,.18);white-space:nowrap;">${order.name}</div>
      </div>`,
      iconSize: [56, 46],
      iconAnchor: [28, 36],
    });

    L.marker(coords, { icon: destIcon }).addTo(map)
      .bindPopup(`<b>${order.name}</b><br>${order.city}, ${order.country}`);
  });

  if (bounds.length > 1) {
    map.fitBounds(L.latLngBounds(bounds).pad(0.3), { maxZoom: 6 });
  } else {
    map.setView([20, 20], 2);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderStats();
renderOrders();
initMap();

</script>
</body>
</html>
