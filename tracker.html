<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track your order · Flags by Otis 🚩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://flagcdn.com">
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://basemaps.cartocdn.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Permanent+Marker&family=Patrick+Hand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --paper:          #fdf6e3;
  --paper-deep:     #f5e6c8;
  --page-bg:        #e8d5b0;
  --card:           #fffdf6;
  --ink:            #2c1a0e;
  --ink-medium:     #4a2e0e;
  --ink-muted:      #8a6840;
  --ink-faint:      #b0905a;
  --border:         #c8a87a;
  --border-light:   #e0d0b8;
  --accent-red:     #d94f3d;
  --accent-red-deep:#9b2e1f;
  --accent-blue:    #3a6ea5;
  --accent-green:   #4a8c5c;
  --accent-yellow:  #e8b84b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--page-bg);
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(100,80,50,0.07) 27px, rgba(100,80,50,0.07) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(100,80,50,0.04) 27px, rgba(100,80,50,0.04) 28px);
  font-family: 'Caveat', cursive;
  color: var(--ink);
  min-height: 100vh;
  padding: 20px;
}

.paper {
  background: var(--paper);
  border-radius: 4px;
  box-shadow: 3px 3px 0 rgba(44,26,14,0.12), 6px 6px 0 rgba(44,26,14,0.06);
  position: relative;
}

.tape::before {
  content: '';
  position: absolute;
  top: -14px; left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  width: 70px; height: 26px;
  background: rgba(255,220,100,0.55);
  border-radius: 2px;
  z-index: 2;
  pointer-events: none;
}

/* ── HEADER ── */
.site-header {
  max-width: 680px;
  margin: 0 auto 32px;
  text-align: center;
  padding: 48px 32px 36px;
}
.badge {
  display: inline-block;
  background: var(--accent-red);
  color: var(--card);
  font-family: 'Permanent Marker', cursive;
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 100px;
  transform: rotate(-2deg);
  margin-bottom: 16px;
}
h1 {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(2rem, 6vw, 3.2rem);
  line-height: 1.1;
  margin-bottom: 10px;
}
.subtitle { font-size: 1.25rem; color: var(--ink-muted); }

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.7rem;
  color: var(--ink);
  text-align: center;
  margin-bottom: 28px;
}
.section-title::after {
  content: '';
  display: block;
  width: 80px; height: 4px;
  background: var(--accent-yellow);
  border-radius: 2px;
  margin: 8px auto 0;
}

/* ── ORDER CARD ── */
.order-card {
  max-width: 680px;
  margin: 0 auto 32px;
  padding: 40px 32px 36px;
}
.order-greeting {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.9rem;
  margin-bottom: 24px;
  line-height: 1.2;
}
.flags-strip {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.flag-thumb {
  height: 60px;
  width: 90px;
  object-fit: cover;
  border: 1px solid var(--border-light);
  border-radius: 2px;
  box-shadow: 2px 2px 0 rgba(44,26,14,0.12);
  display: block;
}
.order-meta {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}
.meta-item {
  background: var(--paper-deep);
  border-radius: 3px;
  padding: 12px 14px;
}
.meta-label {
  font-family: 'Patrick Hand', cursive;
  font-size: 0.88rem;
  color: var(--ink-faint);
  display: block;
  margin-bottom: 3px;
}
.meta-value {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--ink-medium);
  display: block;
}
.notes-item { grid-column: 1 / -1; }
.notes-text { font-style: italic; color: var(--ink-muted); }

/* ── STATUS TIMELINE ── */
.timeline-card {
  max-width: 680px;
  margin: 0 auto 32px;
  padding: 40px 28px 40px;
}
.timeline-wrap {
  position: relative;
  padding: 0 4px;
}
.timeline-track {
  position: absolute;
  top: 21px;
  left: calc(12.5% + 4px);
  right: calc(12.5% + 4px);
  height: 3px;
  background: var(--border);
  border-radius: 2px;
}
.timeline-fill {
  height: 100%;
  background: var(--accent-green);
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0,0,0.2,1);
}
.timeline {
  display: flex;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}
.t-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.t-dot {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 3px solid var(--border);
  background: var(--paper);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  transition: border-color 0.3s, background 0.3s;
}
.t-step.done  .t-dot { background: var(--accent-green); border-color: var(--accent-green); }
.t-step.now   .t-dot { background: var(--accent-red);   border-color: var(--accent-red); box-shadow: 0 0 0 5px rgba(217,79,61,0.18); }
.t-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.82rem;
  text-align: center;
  color: var(--ink-faint);
  line-height: 1.2;
}
.t-step.done .t-label,
.t-step.now  .t-label { color: var(--ink); }
.t-step.now  .t-label { color: var(--accent-red); }

.current-msg {
  background: var(--paper-deep);
  border-radius: 3px;
  padding: 18px 20px;
  margin-top: 32px;
  font-size: 1.2rem;
  color: var(--ink-medium);
  text-align: center;
  line-height: 1.5;
}

/* ── JOURNEY MAP ── */
.map-card {
  max-width: 680px;
  margin: 0 auto 32px;
  padding: 40px 28px 40px;
}
.route-caption {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: 'Permanent Marker', cursive;
  font-size: 1.05rem;
  color: var(--ink-muted);
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.route-caption strong { color: var(--ink); }
#tracker-map {
  height: 300px;
  border-radius: 3px;
  border: 1px solid var(--border);
  overflow: hidden;
  background: var(--paper-deep);
}

/* ── LOADING / ERROR ── */
.state-card {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 32px;
  text-align: center;
}
.state-emoji { font-size: 3.5rem; display: block; margin-bottom: 16px; }
.state-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 2rem;
  margin-bottom: 12px;
}
.state-msg { font-size: 1.2rem; color: var(--ink-muted); line-height: 1.5; }
.back-link {
  display: inline-block;
  margin-top: 24px;
  color: var(--accent-blue);
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  text-decoration: none;
}

/* ── FOOTER ── */
footer {
  text-align: center;
  max-width: 680px;
  margin: 0 auto;
  padding: 16px;
  font-size: 1.1rem;
  color: var(--ink-muted);
}
footer a { color: var(--accent-blue); text-decoration: none; }

@media (max-width: 520px) {
  .order-card, .timeline-card, .map-card { padding: 28px 16px; }
  .t-dot { width: 36px; height: 36px; font-size: 1rem; }
  .t-label { font-size: 0.72rem; }
  .timeline-track { top: 17px; }
  #tracker-map { height: 240px; }
}

/* leaflet override: keep labels readable on warm background */
.leaflet-container { font-family: 'Caveat', cursive; }
</style>
</head>
<body>

<header class="site-header paper tape">
  <div class="badge">🚩 Order tracker</div>
  <h1>Flags by Otis</h1>
  <p class="subtitle">Your handmade flag — made with love in Addis Ababa 📬</p>
</header>

<div id="root">
  <div class="state-card paper">
    <span class="state-emoji">⏳</span>
    <div class="state-title">Loading your order…</div>
    <p class="state-msg">Otis is checking his notebook!</p>
  </div>
</div>

<footer>
  <a href="flag-shop.html">← Back to the shop</a>
  &nbsp;·&nbsp;
  Made with crayons &amp; lots of love 🖍️ — Otis
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSJ8S9ZNtZRFKvAMaJN6cGNAb_TpGawCFZnGSo6KRE9eNIvhDoMXaM5xw_rCtXFTX1Zt3koweSaos6C/pub?output=csv';

const STAGES = [
  { key:'drawn',     emoji:'✏️',  label:'Drawing',    msg:'Otis is drawing your flag right now, one careful line at a time!' },
  { key:'packed',    emoji:'📦',  label:'Packed',     msg:'Packed with love — and your address written by Otis himself.' },
  { key:'sent',      emoji:'✈️',  label:'Sent!',      msg:'Your flag is flying across the world. Almost there!' },
  { key:'delivered', emoji:'🎉',  label:'Delivered!', msg:"It's arrived! We hope it brings a big smile." },
];

const CITY_COORDS = {
  stockholm:[59.329,18.068], göteborg:[57.708,11.974], goteborg:[57.708,11.974],
  malmö:[55.605,13.003], malmo:[55.605,13.003], uppsala:[59.858,17.638],
  linköping:[58.410,15.621], linkoping:[58.410,15.621], örebro:[59.275,15.213],
  orebro:[59.275,15.213], västerås:[59.609,16.544], vasteras:[59.609,16.544],
  helsingborg:[56.046,12.694], norrköping:[58.587,16.192], norrkoping:[58.587,16.192],
  jönköping:[57.782,14.161], jonkoping:[57.782,14.161], lund:[55.704,13.191],
  umeå:[63.825,20.263], umea:[63.825,20.263], gävle:[60.674,17.141],
  gavle:[60.674,17.141], borås:[57.721,12.940], boras:[57.721,12.940],
  eskilstuna:[59.366,16.507], sundsvall:[62.391,17.306], halmstad:[56.674,12.857],
  växjö:[56.877,14.809], vaxjo:[56.877,14.809], kalmar:[56.663,16.356],
  karlstad:[59.379,13.503], luleå:[65.584,22.156], lulea:[65.584,22.156],
  oslo:[59.913,10.752], copenhagen:[55.676,12.568], köpenhamn:[55.676,12.568],
  berlin:[52.520,13.404], london:[51.507,-0.127], paris:[48.856,2.352],
  amsterdam:[52.367,4.904], helsinki:[60.169,24.938], toronto:[43.653,-79.383],
  'new york':[40.712,-74.005], sydney:[-33.868,151.209], nairobi:[-1.292,36.821],
  'addis ababa':[8.980,38.757],
};

const COUNTRY_FALLBACK = {
  sweden:[63.0,16.0], norway:[65.0,13.0], denmark:[56.0,10.0],
  finland:[64.0,26.0], germany:[51.0,10.0], 'united kingdom':[54.0,-2.0],
  uk:[54.0,-2.0], france:[46.0,2.0], netherlands:[52.3,5.2],
  usa:[38.0,-97.0], 'united states':[38.0,-97.0], canada:[56.0,-96.0],
  australia:[-27.0,133.0], kenya:[-0.023,37.906], ethiopia:[9.145,40.489],
  eritrea:[15.179,39.782], somalia:[5.152,46.199], ghana:[7.946,-1.023],
  tanzania:[-6.369,34.888], 'dr congo':[-4.038,21.758], drc:[-4.038,21.758],
};

const ORIGIN = [8.9806, 38.7578];

// ── CSV parsing ─────────────────────────────────────────────
function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  const hdrs = parseRow(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseRow(l);
    const o = {};
    hdrs.forEach((h,i) => o[h.trim()] = (vals[i]||'').trim());
    return o;
  });
}
function parseRow(line) {
  const out=[]; let inQ=false, cur='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){out.push(cur);cur='';}
    else cur+=c;
  }
  out.push(cur);
  return out;
}

// ── Geo helpers ─────────────────────────────────────────────
function lookup(city, country) {
  const c = (city||'').toLowerCase().trim();
  const co = (country||'').toLowerCase().trim();
  return CITY_COORDS[c] || COUNTRY_FALLBACK[co] || [59.329,18.068];
}

function gcArc(lat1,lon1,lat2,lon2,n=60){
  const r=Math.PI/180, d=180/Math.PI;
  const p1=lat1*r, l1=lon1*r, p2=lat2*r, l2=lon2*r;
  const D=2*Math.asin(Math.sqrt(Math.sin((p2-p1)/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin((l2-l1)/2)**2));
  if(!D) return [[lat1,lon1]];
  const pts=[];
  for(let i=0;i<=n;i++){
    const f=i/n, A=Math.sin((1-f)*D)/Math.sin(D), B=Math.sin(f*D)/Math.sin(D);
    const x=A*Math.cos(p1)*Math.cos(l1)+B*Math.cos(p2)*Math.cos(l2);
    const y=A*Math.cos(p1)*Math.sin(l1)+B*Math.cos(p2)*Math.sin(l2);
    const z=A*Math.sin(p1)+B*Math.sin(p2);
    pts.push([Math.atan2(z,Math.sqrt(x*x+y*y))*d, Math.atan2(y,x)*d]);
  }
  return pts;
}

// ── Formatting ──────────────────────────────────────────────
function fmtDate(s){
  if(!s) return '';
  const d=new Date(s);
  return isNaN(d)?s:d.toLocaleDateString('sv-SE',{day:'numeric',month:'long',year:'numeric'});
}

// ── Render ──────────────────────────────────────────────────
function render(order) {
  const flags = order.flag_codes.split(',').map(f=>f.trim()).filter(Boolean);
  const cur = Math.max(0, STAGES.findIndex(s=>s.key===order.status.toLowerCase().trim()));
  const fillPct = cur/(STAGES.length-1)*100;

  document.getElementById('root').innerHTML = `
    <section class="order-card paper tape" aria-label="Your order details">
      <p class="order-greeting">Hi ${order.customer_name}! 👋</p>
      <div class="flags-strip" aria-label="Flags in your order">
        ${flags.map(c=>`<img class="flag-thumb" src="https://flagcdn.com/w160/${c}.png" alt="${c.toUpperCase()} flag" loading="lazy">`).join('')}
      </div>
      <div class="order-meta">
        <div class="meta-item">
          <span class="meta-label">Order</span>
          <span class="meta-value">#${order.order_id}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Destination</span>
          <span class="meta-value">${order.city}${order.country?', '+order.country:''}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Date ordered</span>
          <span class="meta-value">${fmtDate(order.date)}</span>
        </div>
        ${order.notes?`<div class="meta-item notes-item">
          <span class="meta-label">✏️ Otis's note</span>
          <span class="meta-value notes-text">${order.notes}</span>
        </div>`:''}
      </div>
    </section>

    <section class="timeline-card paper tape" aria-label="Order status timeline">
      <h2 class="section-title">Where's your flag?</h2>
      <div class="timeline-wrap">
        <div class="timeline-track">
          <div class="timeline-fill" id="tfill" style="width:${fillPct}%"></div>
        </div>
        <div class="timeline" role="list" aria-label="Delivery stages">
          ${STAGES.map((s,i)=>{
            const cls = i<cur?'done':i===cur?'now':'';
            const emoji = i<cur?'✓':s.emoji;
            return `<div class="t-step ${cls}" role="listitem" aria-current="${i===cur?'step':'false'}">
              <div class="t-dot" title="${s.label}">${emoji}</div>
              <span class="t-label">${s.label}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="current-msg" aria-live="polite">
        ${STAGES[cur].emoji} ${STAGES[cur].msg}
      </div>
    </section>

    <section class="map-card paper tape" aria-label="Journey from Addis Ababa to ${order.city}">
      <h2 class="section-title">The journey</h2>
      <p class="route-caption">
        <strong>Addis Ababa</strong>
        <span style="color:var(--accent-red);">·····&gt;</span>
        <strong>${order.city}</strong>
      </p>
      <div id="tracker-map" role="img" aria-label="Map showing route from Addis Ababa to ${order.city}"></div>
    </section>
  `;

  const destCoords = lookup(order.city, order.country);
  initMap(destCoords, order.city);
}

function initMap(dest, destName) {
  const map = L.map('tracker-map', { zoomControl:true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; <a href="https://openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:'abcd', maxZoom:18,
  }).addTo(map);

  const arc = gcArc(ORIGIN[0],ORIGIN[1],dest[0],dest[1]);
  L.polyline(arc, { color:'#d94f3d', weight:2.5, opacity:0.85, dashArray:'9,7' }).addTo(map);

  function pin(coords, color, label) {
    return L.divIcon({
      className:'',
      html:`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div style="width:13px;height:13px;border-radius:50%;background:${color};border:2px solid #fffdf6;box-shadow:0 0 0 2px ${color},2px 2px 0 rgba(44,26,14,.25);"></div>
        <div style="font-family:'Permanent Marker',cursive;font-size:11px;color:#2c1a0e;background:#fffdf6;padding:2px 6px;border-radius:3px;box-shadow:1px 1px 0 rgba(44,26,14,.18);white-space:nowrap;">${label}</div>
      </div>`,
      iconSize:[80,38], iconAnchor:[40,6],
    });
  }

  L.marker(ORIGIN, { icon:pin('#d94f3d','#d94f3d','🏠 Addis') }).addTo(map);
  L.marker(dest,   { icon:pin('#3a6ea5','#3a6ea5','📬 '+destName) }).addTo(map);
  map.fitBounds(L.latLngBounds([ORIGIN, dest]).pad(0.25));
}

function err(title, msg) {
  document.getElementById('root').innerHTML = `
    <div class="state-card paper">
      <span class="state-emoji">😕</span>
      <div class="state-title">${title}</div>
      <p class="state-msg">${msg}</p>
      <a class="back-link" href="flag-shop.html">← Go to the shop</a>
    </div>`;
}

async function fetchCSV() {
  try {
    const res = await fetch(CSV);
    if (!res.ok) throw new Error();
    return res.text();
  } catch {
    const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(CSV));
    if (!res.ok) throw new Error();
    return res.text();
  }
}

async function init() {
  const p = new URLSearchParams(location.search);
  const id = p.get('order');
  if (!id) { err('No order number!','Add ?order=001 to the URL to track your order.'); return; }
  try {
    const rows = parseCSV(await fetchCSV());
    const order = rows.find(r => r.order_id.toLowerCase()===id.toLowerCase() || r.order_id===id);
    if (!order) { err(`Order not found!`,`Otis looked everywhere but couldn't find order #${id}. Double-check the number!`); return; }
    render(order);
  } catch {
    err('Couldn\'t connect!','There was a problem loading the data. Try again in a moment!');
  }
}

init();
</script>
</body>
</html>
